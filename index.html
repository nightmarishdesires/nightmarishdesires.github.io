<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Your Name</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    background: #0b0b0b;
    color: #fff;
    display: flex;
    min-height: 100vh;
  }

  /* SIDEBAR */
  .sidebar {
    width: 220px;
    padding: 40px 25px;
    position: fixed;
    height: 100vh;
    border-right: 1px solid rgba(255,255,255,0.08);
  }

  .logo {
    font-size: 14px;
    letter-spacing: 2px;
    margin-bottom: 60px;
    opacity: 0.8;
  }

  .menu a {
    display: block;
    color: #aaa;
    text-decoration: none;
    margin-bottom: 18px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
  }

  .menu a:hover {
    color: #fff;
  }

  /* CONTENT */
  .content {
    margin-left: 220px;
    padding: 60px;
    width: 100%;
  }

  section {
    display: none; /* IMPORTANT: hidden by default */
  }

  section.active {
    display: block; /* only active section shows */
  }

  h2 {
    font-size: 22px;
    margin-bottom: 20px;
    font-weight: 400;
    letter-spacing: 1px;
  }

  p {
    color: #aaa;
    line-height: 1.6;
    max-width: 600px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
  }

  iframe {
    width: 100%;
    aspect-ratio: 16/9;
    border: none;
  }

  .photo {
    width: 100%;
    height: 300px;
    object-fit: cover;
  }

  @media (max-width: 768px) {
    .sidebar {
      position: relative;
      width: 100%;
      height: auto;
      border-right: none;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .content {
      margin-left: 0;
      padding: 30px;
    }
  }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">YOUR NAME</div>

  <div class="menu">
    <a onclick="showSection('video')">Video</a>
    <a onclick="showSection('photo')">Photo</a>
    <a onclick="showSection('bio')">Bio</a>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- VIDEO -->
  <section id="video" class="active">
    <h2>Video</h2>

    <div class="grid">
      <iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
      <iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
    </div>
  </section>

  <!-- PHOTO -->
  <section id="photo">
    <h2>Photo</h2>

    <div class="grid">
      <img class="photo" src="https://images.unsplash.com/photo-1520975922284-9f97b3b3c7a1"/>
      <img class="photo" src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"/>
      <img class="photo" src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4"/>
    </div>
  </section>

  <!-- BIO -->
  <section id="bio">
    <h2>Bio</h2>
    <p>
      Write your bio here. Keep it short and clean.
      Talk about your style, work, and what you create.
    </p>
  </section>

</div>

<script>
  function showSection(id) {
    const sections = document.querySelectorAll("section");

    sections.forEach(sec => {
      sec.classList.remove("active");
    });

    document.getElementById(id).classList.add("active");
  }
</script>

</body>
</html>
