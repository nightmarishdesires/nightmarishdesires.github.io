<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>michael ghan</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #0b0b0b;
    color: #fff;
    display: flex;
    min-height: 100vh;
    font-family: "Playfair Display", serif;
  }

  /* SIDEBAR */
  .sidebar {
    width: 240px;
    padding: 50px 30px;
    position: fixed;
    height: 100vh;
    border-right: 1px solid rgba(255,255,255,0.08);
  }

  .name {
    font-size: 22px;
    letter-spacing: 1px;
    margin-bottom: 60px;
    text-transform: lowercase;
  }

  .menu a {
    display: block;
    color: #aaa;
    text-decoration: none;
    margin-bottom: 18px;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: lowercase;
    cursor: pointer;
    transition: 0.2s;
  }

  .menu a:hover {
    color: #fff;
  }

  /* CONTENT */
  .content {
    margin-left: 240px;
    padding: 70px;
    width: 100%;
  }

  section {
    display: none;
  }

  section.active {
    display: block;
  }

  h2 {
    font-size: 20px;
    margin-bottom: 25px;
    font-weight: 400;
    text-transform: lowercase;
    letter-spacing: 1px;
  }

  p {
    color: #aaa;
    line-height: 1.8;
    max-width: 600px;
    font-size: 14px;
  }

  .email {
    margin-top: 20px;
    color: #777;
    font-size: 13px;
  }

  /* VIDEO */
  .video {
    width: 100%;
    aspect-ratio: 16 / 9;
    margin-bottom: 20px;
  }

  .video iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* PHOTO GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
  }

  .photo {
    width: 100%;
    height: 320px;
    object-fit: cover;
  }

  @media (max-width: 768px) {
    .sidebar {
      position: relative;
      width: 100%;
      height: auto;
      border-right: none;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .content {
      margin-left: 0;
      padding: 30px;
    }
  }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="name">michael ghan</div>

  <div class="menu">
    <a onclick="showSection('video')">video</a>
    <a onclick="showSection('photo')">photo</a>
    <a onclick="showSection('bio')">bio</a>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- VIDEO -->
  <section id="video" class="active">
    <h2>video</h2>

    <div class="video">
      <iframe 
        src="https://player.vimeo.com/video/839530277?title=0&byline=0&portrait=0&badge=0&autopause=0&player_id=0&app_id=58479"
        allow="autoplay; fullscreen; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </section>

  <!-- PHOTO -->
  <section id="photo">
    <h2>photo</h2>

    <div class="grid">
      <img class="photo" src="https://images.unsplash.com/photo-1520975922284-9f97b3b3c7a1"/>
      <img class="photo" src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"/>
      <img class="photo" src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4"/>
    </div>
  </section>

  <!-- BIO -->
  <section id="bio">
    <h2>bio</h2>

    <p>
      filmmaker + photographer living in los angeles
    </p>

    <div class="email">
      nightmarish.desires@gmail.com
    </div>
  </section>

</div>

<script>
  function showSection(id) {
    const sections = document.querySelectorAll("section");

    sections.forEach(sec => {
      sec.classList.remove("active");
    });

    document.getElementById(id).classList.add("active");
  }
</script>

</body>
</html>
